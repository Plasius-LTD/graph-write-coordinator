name: CD (Publish to npm)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type. Use none after a release-prep PR on protected main."
        required: true
        type: choice
        default: none
        options:
          - patch
          - minor
          - major
          - none
      preid:
        description: "Pre-release id (e.g. beta, rc). Leave blank for stable"
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  pull-requests: write

env:
  FALLBACK_RUNNER_LABEL: ubuntu-latest
  SELF_HOSTED_RUNNER_LABELS: '["self-hosted","Linux","X64"]'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: npm-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_release:
    uses: ./.github/workflows/release-prepare.yml
    with:
      bump: ${{ inputs.bump }}
      preid: ${{ inputs.preid }}
    secrets: inherit

  publish:
    needs: prepare_release
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: npm ci --no-fund --no-audit --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Security audit (runtime deps)
        run: npm run audit:npm

      - name: Build
        if: steps.release.outputs.should_publish == 'true'
        run: npm run build --if-present

      - name: Test with coverage
        run: npm run test:coverage

      - name: Install Codecov CLI
        run: python3 -m pip install --upgrade codecov-cli

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          codecovcli --verbose upload-process --disable-search --fail-on-error \
            -n "release-${GITHUB_RUN_ID}" \
            -F unittests \
            -f ./coverage/lcov.info

      - name: Use prepared release metadata
        id: release
        run: |
          set -euo pipefail

          FLAGS="${{ needs.prepare_release.outputs.flags }}"
          PACKAGE_ACCESS=""
          if [ "${FLAGS}" = "--access public" ]; then
            PACKAGE_ACCESS="public"
          fi

          PUBLISHED="${{ needs.prepare_release.outputs.published }}"
          SHOULD_PUBLISH="true"
          SKIP_REASON=""
          if [ "${PUBLISHED}" = "true" ]; then
            SHOULD_PUBLISH="false"
            SKIP_REASON="Package version ${{ needs.prepare_release.outputs.version }} is already published; nothing to release."
          fi

          {
            echo "package_name=${{ needs.prepare_release.outputs.name }}"
            echo "package_access=${PACKAGE_ACCESS}"
            echo "release_version=${{ needs.prepare_release.outputs.version }}"
            echo "release_tag=${{ needs.prepare_release.outputs.tag }}"
            echo "should_publish=${SHOULD_PUBLISH}"
            echo "skip_reason=${SKIP_REASON}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate SBOM (CycloneDX)
        if: steps.release.outputs.should_publish == 'true'
        run: npm sbom --sbom-format=cyclonedx --sbom-type=library --omit dev > sbom.cdx.json
        continue-on-error: true

      - name: Attest SBOM
        if: ${{ hashFiles('sbom.cdx.json') != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: sbom.cdx.json

      - name: Create release tag from main
        if: steps.release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch origin main --tags
          git checkout -B main origin/main

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            if gh release view "${TAG}" >/dev/null 2>&1; then
              IS_DRAFT="$(gh release view "${TAG}" --json isDraft --jq '.isDraft')"
              if [ "${IS_DRAFT}" != "true" ]; then
                echo "Published release ${TAG} already exists; reusing the existing tag."
                exit 0
              fi
            fi

            echo "Deleting stale unpublished tag ${TAG} before recreating it from main."
            git push origin ":refs/tags/${TAG}"
          fi

          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release draft
        if: steps.release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
            if [ "$IS_DRAFT" != "true" ]; then
              echo "Release $TAG already exists and is published. Cut a new version instead."
              exit 1
            fi

            echo "Draft release $TAG already exists; refreshing mutable assets."
            if [ -s sbom.cdx.json ]; then
              gh release upload "$TAG" sbom.cdx.json --clobber
            else
              echo "Skipping SBOM release upload (file missing or empty)."
            fi
          else
            if [ -s sbom.cdx.json ]; then
              gh release create "$TAG" sbom.cdx.json --title "Release $TAG" --generate-notes --verify-tag --draft
            else
              gh release create "$TAG" --title "Release $TAG" --generate-notes --verify-tag --draft
            fi
          fi

      - name: Publish to npm
        if: steps.release.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_ACCESS: ${{ steps.release.outputs.package_access }}
        run: |
          set -euo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required" >&2
            exit 1
          fi

          if [ "${PACKAGE_ACCESS}" = "public" ]; then
            npm publish --access public --provenance --registry https://registry.npmjs.org
          else
            npm publish --provenance --registry https://registry.npmjs.org
          fi

      - name: Publish GitHub Release
        if: steps.release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Expected draft release $TAG to exist before publication."
            exit 1
          fi

          IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
          if [ "$IS_DRAFT" = "true" ]; then
            gh release edit "$TAG" --draft=false --latest
          else
            echo "Release $TAG is already published; skipping publication."
          fi
